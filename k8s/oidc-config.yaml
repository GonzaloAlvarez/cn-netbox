# Overrides the upstream /etc/netbox/config/extra.py with our Authentik OIDC
# wiring. The chart's `extraConfig` mechanism appends YAML, which is no good
# for Django settings that need env-var interpolation. extra.py is plain
# Python — Django reads it at import time, so we can pull secrets from env.
#
# The chart projects `SOCIAL_AUTH_OIDC_{KEY,SECRET}` into the pod via the
# `extraEnvs` block in helmchart.yaml (valueFrom: secretKeyRef →
# netbox-secrets), and the endpoint URL is a plain literal.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-oidc-extra
  namespace: netbox
data:
  extra.py: |
    """OIDC integration via Authentik on auth.{neptune.lan,lab.gn.al}.

    Authentik provider + application are created by
    cn-authentik/setup-netbox-oidc.sh. NetBox-side wiring uses
    python-social-auth's OpenIdConnectAuth backend (bundled with NetBox 4.x).

    Login URL:        /oauth/login/oidc/?next=/
    Callback URL:     /oauth/complete/oidc/  (registered on the Authentik side)
    Issuer endpoint:  https://auth.neptune.lan/application/o/netbox
                      (server-side calls only — pods can't resolve auth.lab.gn.al)

    Browser-facing authorization URL is picked per-request by the
    HomelabOIDCBackend subclass below — tailnet requests get auth.lab.gn.al,
    everything else stays on auth.neptune.lan.
    """
    import os
    import sys
    import types

    from social_core.backends.open_id_connect import OpenIdConnectAuth


    class HomelabOIDCBackend(OpenIdConnectAuth):
        # Django stores `f'{cls.__module__}.{cls.__name__}'` in the session
        # under _auth_user_backend, and re-imports it on every subsequent
        # request to restore request.user. NetBox's configuration.py loads
        # this file via spec_from_file_location('', path), so without an
        # override `__module__` is the empty string and Django serializes us
        # as `.HomelabOIDCBackend`, which import_string then refuses to
        # resolve — the SSO sign-in "succeeds" but the user appears anonymous
        # again the moment they navigate anywhere.
        __module__ = 'homelab_oidc_extra'

        """Per-request authorization URL split + Authentik groups claim.

        - **Server-side endpoints** (token, userinfo, JWKS, discovery): always
          https://auth.neptune.lan — pods can resolve this via pfSense Host
          Override and trust step-ca via /tls/ca-bundle.crt.
        - **Browser-facing authorization endpoint**:
            - request.get_host() ends with '.lab.gn.al' (tailnet ingress)
              → swap to auth.lab.gn.al for the tailnet browser path.
            - otherwise (netbox.k8s.lan) → keep auth.neptune.lan for LAN.
        - **Scope**: include `groups` so Authentik puts the user's group
          membership in the id_token; the pipeline step below maps it to
          NetBox superuser / Django group membership.

        We deliberately do NOT override get_user_details() to add a `groups`
        key — the default PSA `user_details` pipeline step iterates the
        details dict and does `setattr(user, key, value)` on every entry,
        which raises TypeError on the `groups` M2M relationship ("Direct
        assignment to the forward side of a many-to-many set is prohibited").
        The role handler below reads the groups claim from `response`
        directly, which is the raw token payload PSA passes through to
        every pipeline step.
        """

        name = 'oidc'
        DEFAULT_SCOPE = ['openid', 'profile', 'email', 'groups']

        def authorization_url(self):
            base = super().authorization_url()
            request = getattr(self.strategy, 'request', None)
            if request is not None:
                host = request.get_host()
                if host.endswith('.lab.gn.al'):
                    return base.replace('auth.neptune.lan', 'auth.lab.gn.al', 1)
            return base


    def homelab_authentik_role_handler(strategy, details, user=None, response=None, *args, **kwargs):
        """Map Authentik OIDC groups onto NetBox roles + Django group membership.

        - Authentik group `infra-admins`  → NetBox superuser (full access).
        - Every Authentik group is mirrored as a Django Group on the user; the
          group is auto-created if it didn't already exist locally. NetBox
          object-permissions can then be scoped per-group inside the UI.

        Reads `response['groups']` (the raw id_token claim) — NOT
        `details['groups']`, because PSA's user_details step would then try
        to setattr(user, 'groups', [...]) and Django rejects direct
        assignment to many-to-many relationships.

        Runs once per login (PSA pipeline step). Idempotent.
        """
        if not user or not response:
            return
        groups = response.get('groups') or []

        from django.contrib.auth.models import Group

        # 1. superuser promotion based on group membership.
        desired_super = 'infra-admins' in groups
        if user.is_superuser != desired_super:
            user.is_superuser = desired_super
            user.save(update_fields=['is_superuser'])

        # 2. Mirror Authentik groups onto Django groups (create if missing).
        #    Authentik's default groups like "authentik Admins" are pulled in
        #    too — harmless on NetBox's side and useful as a single source of
        #    truth for which Authentik group the login came from.
        if groups:
            django_groups = [Group.objects.get_or_create(name=g)[0] for g in groups]
            user.groups.set(django_groups)
        else:
            user.groups.clear()


    # NetBox's configuration.py loads us into sys.modules at
    # 'netbox.configuration.extra' AFTER our module body finishes executing,
    # AND `netbox.configuration` is a single-file module (not a package), so
    # Django's import_string can't resolve REMOTE_AUTH_BACKEND through it
    # either way. Build a brand-new top-level ModuleType with the backend
    # class AND the pipeline handler attached, and register it now; Django
    # will find both via import_module('homelab_oidc_extra').
    _homelab_oidc_module = types.ModuleType('homelab_oidc_extra')
    _homelab_oidc_module.HomelabOIDCBackend = HomelabOIDCBackend
    _homelab_oidc_module.homelab_authentik_role_handler = homelab_authentik_role_handler
    sys.modules['homelab_oidc_extra'] = _homelab_oidc_module
    # Pin __module__ on the function too so any stack traces or PSA debug
    # logging point at the right place.
    homelab_authentik_role_handler.__module__ = 'homelab_oidc_extra'

    REMOTE_AUTH_ENABLED = True
    REMOTE_AUTH_BACKEND = 'homelab_oidc_extra.HomelabOIDCBackend'
    REMOTE_AUTH_AUTO_CREATE_USER = True

    SOCIAL_AUTH_OIDC_OIDC_ENDPOINT = os.environ.get(
        'SOCIAL_AUTH_OIDC_OIDC_ENDPOINT',
        'https://auth.neptune.lan/application/o/netbox',
    )
    SOCIAL_AUTH_OIDC_KEY = os.environ.get('SOCIAL_AUTH_OIDC_KEY', '')
    SOCIAL_AUTH_OIDC_SECRET = os.environ.get('SOCIAL_AUTH_OIDC_SECRET', '')

    # NetBox is behind ingress-nginx (LAN) / VPS traefik-lab (tailnet) — both
    # terminate TLS and forward HTTP to the pod. Without these, Django sees
    # request.is_secure() == False and python-social-auth constructs an
    # http:// redirect_uri, which Authentik refuses because its registered
    # URI is https://. Trust the X-Forwarded-Proto header from the proxies
    # and force the OIDC redirect to https either way.
    SECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')
    USE_X_FORWARDED_HOST = True
    SOCIAL_AUTH_REDIRECT_IS_HTTPS = True

    # Force OIDC discovery + tokens over a CA bundle that includes step-ca.
    # The init container in helmchart.yaml builds /tls/ca-bundle.crt by
    # concatenating the system trust store with the step-ca root, so requests
    # to https://auth.neptune.lan verify without breaking trust in LE roots
    # (which other future OIDC backchannels would need).
    SOCIAL_AUTH_OIDC_VERIFY_SSL = os.environ.get(
        'REQUESTS_CA_BUNDLE', '/tls/ca-bundle.crt')

    # Append the homelab role handler to NetBox's default PSA pipeline.
    # `from netbox.settings import SOCIAL_AUTH_PIPELINE` would be ideal but
    # triggers a circular import: settings.py imports configuration.py
    # (which loads us) BEFORE it has finished defining SOCIAL_AUTH_PIPELINE.
    # Mirror NetBox 4.x's default tuple verbatim and append our step. If
    # NetBox upstream changes the pipeline in a future release, this list
    # has to be re-synced (the existing entries are stable across 4.x).
    SOCIAL_AUTH_PIPELINE = (
        'social_core.pipeline.social_auth.social_details',
        'social_core.pipeline.social_auth.social_uid',
        'social_core.pipeline.social_auth.social_user',
        'social_core.pipeline.user.get_username',
        'social_core.pipeline.user.create_user',
        'social_core.pipeline.social_auth.associate_user',
        'netbox.authentication.user_default_groups_handler',
        'social_core.pipeline.social_auth.load_extra_data',
        'social_core.pipeline.user.user_details',
        # Homelab additions:
        'homelab_oidc_extra.homelab_authentik_role_handler',
    )
