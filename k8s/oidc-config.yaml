# Overrides the upstream /etc/netbox/config/extra.py with our Authentik OIDC
# wiring. The chart's `extraConfig` mechanism appends YAML, which is no good
# for Django settings that need env-var interpolation. extra.py is plain
# Python — Django reads it at import time, so we can pull secrets from env.
#
# The chart projects `SOCIAL_AUTH_OIDC_{KEY,SECRET}` into the pod via the
# `extraEnvs` block in helmchart.yaml (valueFrom: secretKeyRef →
# netbox-secrets), and the endpoint URL is a plain literal.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-oidc-extra
  namespace: netbox
data:
  extra.py: |
    """OIDC integration via Authentik on auth.neptune.lan.

    Authentik provider + application are created by
    cn-authentik/setup-netbox-oidc.sh. NetBox-side wiring uses
    python-social-auth's OpenIdConnectAuth backend (bundled with NetBox 4.x).

    Login URL:        /oauth/login/oidc/?next=/
    Callback URL:     /oauth/complete/oidc/  (registered on the Authentik side)
    Issuer endpoint:  https://auth.neptune.lan/application/o/netbox
    """
    import os

    REMOTE_AUTH_ENABLED = True
    REMOTE_AUTH_BACKEND = 'social_core.backends.open_id_connect.OpenIdConnectAuth'
    REMOTE_AUTH_AUTO_CREATE_USER = True

    SOCIAL_AUTH_OIDC_OIDC_ENDPOINT = os.environ.get(
        'SOCIAL_AUTH_OIDC_OIDC_ENDPOINT',
        'https://auth.neptune.lan/application/o/netbox',
    )
    SOCIAL_AUTH_OIDC_KEY = os.environ.get('SOCIAL_AUTH_OIDC_KEY', '')
    SOCIAL_AUTH_OIDC_SECRET = os.environ.get('SOCIAL_AUTH_OIDC_SECRET', '')

    # Force OIDC discovery + tokens over a CA bundle that includes step-ca.
    # The init container in helmchart.yaml builds /tls/ca-bundle.crt by
    # concatenating the system trust store with the step-ca root, so requests
    # to https://auth.neptune.lan verify without breaking trust in LE roots
    # (which other future OIDC backchannels would need).
    SOCIAL_AUTH_OIDC_VERIFY_SSL = os.environ.get(
        'REQUESTS_CA_BUNDLE', '/tls/ca-bundle.crt')
