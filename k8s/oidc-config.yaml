# Overrides the upstream /etc/netbox/config/extra.py with our Authentik OIDC
# wiring. The chart's `extraConfig` mechanism appends YAML, which is no good
# for Django settings that need env-var interpolation. extra.py is plain
# Python — Django reads it at import time, so we can pull secrets from env.
#
# The chart projects `SOCIAL_AUTH_OIDC_{KEY,SECRET}` into the pod via the
# `extraEnvs` block in helmchart.yaml (valueFrom: secretKeyRef →
# netbox-secrets), and the endpoint URL is a plain literal.
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-oidc-extra
  namespace: netbox
data:
  extra.py: |
    """OIDC integration via Authentik on auth.{neptune.lan,lab.gn.al}.

    Authentik provider + application are created by
    cn-authentik/setup-netbox-oidc.sh. NetBox-side wiring uses
    python-social-auth's OpenIdConnectAuth backend (bundled with NetBox 4.x).

    Login URL:        /oauth/login/oidc/?next=/
    Callback URL:     /oauth/complete/oidc/  (registered on the Authentik side)
    Issuer endpoint:  https://auth.neptune.lan/application/o/netbox
                      (server-side calls only — pods can't resolve auth.lab.gn.al)

    Browser-facing authorization URL is picked per-request by the
    HomelabOIDCBackend subclass below — tailnet requests get auth.lab.gn.al,
    everything else stays on auth.neptune.lan.
    """
    import os

    from social_core.backends.open_id_connect import OpenIdConnectAuth


    class HomelabOIDCBackend(OpenIdConnectAuth):
        """Per-request authorization URL split for the dual-ingress homelab.

        - **Server-side endpoints** (token, userinfo, JWKS, discovery): always
          https://auth.neptune.lan — pods can resolve this via pfSense Host
          Override and trust step-ca via /tls/ca-bundle.crt.
        - **Browser-facing authorization endpoint**:
            - request.get_host() ends with '.lab.gn.al' (tailnet ingress)
              → swap the issuer host to auth.lab.gn.al so the tailnet browser
              (which has no DNS for auth.neptune.lan) can reach Authentik
              via the VPS traefik-lab → re-encrypt → neptune path.
            - otherwise (LAN ingress, netbox.k8s.lan)
              → keep auth.neptune.lan, which the LAN client resolves via
              pfSense and reaches directly with a step-ca cert.

        The redirect_uri parameter is unaffected — it's built from the request
        host by python-social-auth, so it correctly stays
        https://netbox.lab.gn.al/oauth/complete/oidc/ for tailnet and
        https://netbox.k8s.lan/oauth/complete/oidc/ for LAN, both of which
        are pre-registered on the Authentik provider.
        """

        name = 'oidc'

        def authorization_url(self):
            base = super().authorization_url()
            request = getattr(self.strategy, 'request', None)
            if request is not None:
                host = request.get_host()
                if host.endswith('.lab.gn.al'):
                    return base.replace('auth.neptune.lan', 'auth.lab.gn.al', 1)
            return base


    REMOTE_AUTH_ENABLED = True
    # NetBox's configuration.py loads this file as netbox.configuration.extra
    # (see /opt/netbox/netbox/netbox/configuration.py `_import`), so the
    # subclass above is importable from Django at exactly this path.
    REMOTE_AUTH_BACKEND = 'netbox.configuration.extra.HomelabOIDCBackend'
    REMOTE_AUTH_AUTO_CREATE_USER = True

    SOCIAL_AUTH_OIDC_OIDC_ENDPOINT = os.environ.get(
        'SOCIAL_AUTH_OIDC_OIDC_ENDPOINT',
        'https://auth.neptune.lan/application/o/netbox',
    )
    SOCIAL_AUTH_OIDC_KEY = os.environ.get('SOCIAL_AUTH_OIDC_KEY', '')
    SOCIAL_AUTH_OIDC_SECRET = os.environ.get('SOCIAL_AUTH_OIDC_SECRET', '')

    # NetBox is behind ingress-nginx (LAN) / VPS traefik-lab (tailnet) — both
    # terminate TLS and forward HTTP to the pod. Without these, Django sees
    # request.is_secure() == False and python-social-auth constructs an
    # http:// redirect_uri, which Authentik refuses because its registered
    # URI is https://. Trust the X-Forwarded-Proto header from the proxies
    # and force the OIDC redirect to https either way.
    SECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')
    USE_X_FORWARDED_HOST = True
    SOCIAL_AUTH_REDIRECT_IS_HTTPS = True

    # Force OIDC discovery + tokens over a CA bundle that includes step-ca.
    # The init container in helmchart.yaml builds /tls/ca-bundle.crt by
    # concatenating the system trust store with the step-ca root, so requests
    # to https://auth.neptune.lan verify without breaking trust in LE roots
    # (which other future OIDC backchannels would need).
    SOCIAL_AUTH_OIDC_VERIFY_SSL = os.environ.get(
        'REQUESTS_CA_BUNDLE', '/tls/ca-bundle.crt')
