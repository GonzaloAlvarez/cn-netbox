---
# NetBox 4.x via the maintained community chart.
# Multi-host via ALLOWED_HOSTS / CSRF_TRUSTED_ORIGINS env vars.
# External Postgres = the CNPG Cluster created in pg-cluster.yaml.
# Bundled Redis (chart default) on Longhorn.
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: netbox
  namespace: kube-system
spec:
  chart: netbox
  repo: https://charts.netbox.oss.netboxlabs.com
  version: "5.0.x"
  targetNamespace: netbox
  createNamespace: false
  valuesContent: |-
    # Bitnami subcharts (redis) refuse to deploy with non-allowlisted images
    # (their new "verifyImages" security gate). bitnamilegacy/* images are the
    # exact same binaries Bitnami yanked, just under a new namespace, so we
    # opt out of the check.
    global:
      security:
        allowInsecureImages: true

    image:
      registry: docker.io
      repository: netboxcommunity/netbox
      tag: v4.6
      pullPolicy: IfNotPresent

    replicaCount: 1

    # Worker shares the media PVC with web. The PVC is RWX (Longhorn share-manager),
    # so multi-attach is fine.
    worker:
      replicaCount: 1
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 500m, memory: 384Mi }

    # gunicorn: workers=1 threads=8 — avoids prometheus_multiproc_dir
    # data-corruption gotcha while still saturating Pi 4 cores.
    gunicorn:
      workers: 1
      threads: 8

    housekeeping:
      enabled: true
      schedule: "0 3 * * *"

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: netbox

    # External Postgres via CNPG
    postgresql:
      enabled: false
    externalDatabase:
      host: netbox-pg-rw.netbox.svc.cluster.local
      port: 5432
      database: netbox
      username: netbox
      existingSecretName: netbox-pg-app
      existingSecretKey: password

    # Bundled Redis (Bitnami subchart). Bitnami yanked their free image catalog
    # in Aug 2025; use the bitnamilegacy/* images that they moved still-existing
    # binaries into. (Same images, different namespace.)
    redis:
      enabled: true
      image:
        repository: bitnamilegacy/redis
      sentinel:
        image:
          repository: bitnamilegacy/redis-sentinel
      kubectl:
        image:
          repository: bitnamilegacy/kubectl
      auth:
        existingSecret: netbox-secrets
        existingSecretPasswordKey: REDIS_PASSWORD
      master:
        persistence:
          enabled: true
          size: 1Gi
          storageClass: longhorn
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits:   { cpu: 200m, memory: 128Mi }
      replica:
        replicaCount: 0   # primary-only is enough for NetBox

    # Persistence for /opt/netbox/netbox/{media,reports,scripts}.
    # RWX so web + worker can share the volume (Longhorn share-manager NFS).
    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteMany
      size: 5Gi

    # We manage two Ingress objects ourselves (one per domain)
    ingress:
      enabled: false

    # Multi-host: NetBox accepts requests for both domains.
    # NB: the chart writes these into /run/config/netbox/netbox.yaml — env vars
    # like ALLOWED_HOSTS are ignored. Use `allowedHosts` (list) and
    # `csrf.trustedOrigins` (list, scheme required).
    allowedHosts:
      - netbox.k8s.lan
      - netbox.lab.gn.al
      - localhost
    csrf:
      trustedOrigins:
        - https://netbox.k8s.lan
        - https://netbox.lab.gn.al
        - http://netbox.k8s.lan

    # Initial superuser bootstrap. Keys are lowercase to match the actual
    # keys in the sealed Secret (the chart silently treats missing keys as
    # empty, which would mean a fresh install boots with no admin password).
    superuser:
      existingSecret: netbox-secrets
      passwordKey: superuser_password
      apiTokenKey: api_token

    # SECRET_KEY must be stable across pod restarts — comes from sealed Secret.
    # The chart's `existingSecret` value mounts it.
    existingSecret: netbox-secrets

    resources:
      requests: { cpu: 200m, memory: 768Mi }
      limits:   { cpu: 2000m, memory: 1536Mi }

    # NetBox initial DB migration takes 5-10 min on Pi storage. Stretch the
    # probes so kubelet doesn't kill the container mid-migration.
    startupProbe:
      enabled: true
      failureThreshold: 60
      periodSeconds: 15
      timeoutSeconds: 10
    # Chart 5.x hard-codes livenessProbe to GET :8081/status/applications/netbox/processes/running
    # (nginx-unit status). NetBox v4.6 dropped nginx-unit for granian, which only listens on :8080,
    # so the default probe is "connection refused" every cycle and kubelet restarts the container
    # every ~11 min. Override to hit /login/ on :8080 with a Host header that matches ALLOWED_HOSTS.
    customLivenessProbe:
      httpGet:
        path: /login/
        port: http
        httpHeaders:
          - name: Host
            value: netbox.k8s.lan
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      enabled: true
      initialDelaySeconds: 600
      periodSeconds: 30
      timeoutSeconds: 10
    readinessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
