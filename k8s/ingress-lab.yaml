---
# TLS terminates at VPS Traefik; cluster ingress sees plaintext from the
# subnet route. NetBox sets large session cookies post-login, so bump
# proxy buffers.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbox-lab
  namespace: netbox
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: netbox.lab.gn.al
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: netbox, port: { number: 80 } }
