---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbox-lan
  namespace: netbox
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: netbox.k8s.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: netbox, port: { number: 80 } }
