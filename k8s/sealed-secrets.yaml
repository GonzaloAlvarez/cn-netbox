---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: netbox-secrets
  namespace: netbox
spec:
  encryptedData:
    REDIS_PASSWORD: 
    SECRET_KEY: 
    SUPERUSER_API_TOKEN: 
    SUPERUSER_PASSWORD: 
  template:
    metadata:
      name: netbox-secrets
      namespace: netbox
---
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: netbox-backup
  namespace: netbox
spec:
  encryptedData:
    BACKUP_AWS_ACCESS_KEY_ID: 
    BACKUP_AWS_REGION: 
    BACKUP_AWS_SECRET_ACCESS_KEY: 
    BACKUP_S3_BUCKET: 
    BACKUP_WEBDAV_PASSWORD: 
    BACKUP_WEBDAV_URL: 
    BACKUP_WEBDAV_USER: 
    NOTIFICATION_URLS: 
  template:
    metadata:
      name: netbox-backup
      namespace: netbox
